<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — TechMate Seniors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        coral: { 500: '#FF6B42', 600: '#E8522A' },
                        ocean: { 500: '#3B82F6', 600: '#2563EB' }
                    },
                    animation: {
                        'bounce-gentle': 'bounceGentle 2s ease-in-out infinite',
                        'pop': 'pop 0.6s ease-out forwards',
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes bounceGentle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .gradient-hero { background: linear-gradient(135deg, #FF6B42 0%, #FF8A6B 25%, #FFB09A 50%, #60A5FA 75%, #3B82F6 100%); background-size: 300% 300%; animation: gradientX 8s ease infinite; }
        @keyframes gradientX { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .btn-primary { background: linear-gradient(135deg, #FF6B42, #E8522A); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 40px -8px rgba(255,107,66,0.5); }
    </style>
</head>
<body class="bg-[#FFFBF7] min-h-screen flex items-center justify-center px-6">
    <div class="max-w-lg w-full text-center">
        <div class="gradient-hero rounded-[2rem] p-12 md:p-16 relative overflow-hidden">
            <div class="animate-pop text-7xl md:text-8xl mb-6">✅</div>
            <h1 class="text-3xl md:text-4xl font-black text-white mb-4">Thank You!</h1>
            <p class="text-white/85 text-lg mb-3">We received your booking request.</p>
            <p class="text-white/70 text-base mb-10">We'll get back to you within a few hours. In the meantime, give your parents a call — they'd love to hear from you. 📞</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="index.html" class="bg-white text-coral-600 px-6 py-3 rounded-full font-bold inline-flex items-center justify-center gap-2 hover:shadow-lg hover:-translate-y-0.5 transition-all">
                    ← Back to Home
                </a>
                <a href="tel:+61468468621" class="bg-white/20 text-white border border-white/30 px-6 py-3 rounded-full font-semibold inline-flex items-center justify-center gap-2 hover:bg-white/30 transition-all">
                    Call Us Now
                </a>
            </div>
        </div>
        <p class="text-gray-400 text-sm mt-6">TechMate Seniors — Werribee, Melbourne</p>
    </div>
</body>
</html>
